name: Playwright Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ──────────────────────────────────────────────
      # NEW: Start server FOREGROUND but disown it so next steps can run
      # ──────────────────────────────────────────────
      - name: Start server with test database (foreground + disown)
        run: |
          cross-env TEST_DB_PATH=../test/test-data/databaseForTest.db node server.js > server.log 2>&1 &
          echo $! > server.pid   # save the PID so we can kill it later if needed
          disown                     # detach from shell so step doesn't wait

      # Give it time to boot or crash
      - name: Wait briefly and capture early logs
        run: |
          sleep 8
          echo "=== Current server.log contents (if any) ==="
          cat server.log || echo "(file still missing or empty)"
          echo ""
          echo "=== Is anything listening on port 3000? ==="
          sudo netstat -tuln | grep 3000 || echo "Nothing on 3000"
          echo ""
          echo "=== Running node processes ==="
          ps aux | grep -i "[n]ode" || echo "No node process found"

      # Now wait properly (use tcp to avoid http protocol issues)
      - name: Wait for server to be ready
        run: npx wait-on --timeout 45000 tcp:3000 || echo "Timeout - check logs above"

      # Your tests
      - name: Run Playwright tests
        run: npm run test:e2e

      # Optional: kill server after tests (clean up)
      - name: Stop server (if still running)
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi