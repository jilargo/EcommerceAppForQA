name: Playwright Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start server with test database
        run: cross-env TEST_DB_PATH=../test/test-data/databaseForTest.db node server.js &
      -  name: Debug server startup
         run: |
          sleep 10
          cat server.log || true
          netstat -tuln | grep 3000 || true
          ps aux | grep "[n]ode server.js" || true

      - name: Wait for server to respond
        run: npx wait-on --timeout 60000 tcp:3000
      
      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14